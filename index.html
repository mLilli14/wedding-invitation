<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f3e8f5">
<title>Αδάμος & Μαρία — 27.09.2026</title>
<link rel="stylesheet" href="final-v11.css?v=11">
</head>
<body>
<main>
<section id="intro" class="scene active">
  <div class="envelope" id="envelope">
    <div class="env-back"></div>
    <div class="peek"></div>
    <div class="env-flap"></div>
    <div class="env-front"></div>
  </div>
  <button id="openEnvelope" class="btn">Άνοιξε το προσκλητήριο</button>
</section>

<section id="coverScene" class="scene">
  <div class="cover-shell" id="coverShell">
    <div class="cover-depth"></div>
    <div class="cover-card">
      <img class="page-img" src="page-1.png" alt="Εξώφυλλο">
    </div>
    <img class="lace lace-top" src="lace-top.svg" alt="">
    <img class="lace lace-bottom" src="lace-bottom.svg" alt="">
    <img class="lace lace-right" src="lace-right.svg" alt="">
    <img class="bow" id="bow" src="bow-clean.png" alt="">
  </div>
  <button id="untieBow" class="btn">Λύσε τον φιόγκο</button>
</section>

<section id="pageScene" class="scene">
  <div class="flip-stage">
    <div class="page-depth"></div>
    <div class="flip-leaf" id="flipLeaf">
      <div class="face front">
        <div class="plain-card"><img src="page-2.png" alt="Μπροστινή όψη"></div>
      </div>
      <div class="face back">
        <div class="plain-card"><img src="page-3.png" alt="Πίσω όψη"></div>
      </div>
      <div class="page-light"></div>
    </div>
  </div>
  <div class="actions">
    <button id="turnPage" class="btn">Γύρισε τη σελίδα</button>
    <button id="closeBook" class="btn hidden">Κλείσε το προσκλητήριο</button>
  </div>
</section>

<section id="backScene" class="scene">
  <div class="cover-shell back-cover">
    <div class="cover-depth back-depth"></div>
    <div class="cover-card">
      <img class="page-img" src="page-4.png" alt="Πίσω εξώφυλλο">
    </div>
    <img class="lace lace-top" src="lace-top.svg" alt="">
    <img class="lace lace-bottom" src="lace-bottom.svg" alt="">
    <img class="lace lace-left" src="lace-left.svg" alt="">
  </div>
  <button id="showMap" class="btn">Δες τον χάρτη</button>
</section>

<section id="mapScene" class="scene">
  <div class="map-card">
    <h1>Οι τοποθεσίες μας</h1>
    <p>Πατήστε για άμεση πλοήγηση.</p>
    <a class="location" href="https://maps.app.goo.gl/kownvrBH4MBfg8E36" target="_blank" rel="noopener">
      <span>✦</span><span><strong>Ιερός Ναός Αγίας Θέκλας</strong><small>Αγία Νάπα</small></span>
    </a>
    <div class="route"><span>27.09.2026</span></div>
    <a class="location" href="https://maps.app.goo.gl/R26q9qrDRgKVt6Wx8" target="_blank" rel="noopener">
      <span>✦</span><span><strong>Ζάππειον Παλάς</strong><small>Δερύνεια</small></span>
    </a>
    <div class="map-buttons">
      <a class="btn link-btn" href="https://maps.app.goo.gl/kownvrBH4MBfg8E36" target="_blank" rel="noopener">Οδηγίες για την εκκλησία</a>
      <a class="btn link-btn" href="https://maps.app.goo.gl/R26q9qrDRgKVt6Wx8" target="_blank" rel="noopener">Οδηγίες για τη δεξίωση</a>
    </div>
    <button id="restart" class="restart">Προβολή από την αρχή</button>
  </div>
</section>
</main>
<script src="final-v11.js?v=11"></script>
</body>
</html>

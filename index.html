<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f3e8f5">
  <title>Αδάμος & Μαρία — 27.09.2026</title>
  <link rel="stylesheet" href="premium.css?v=1">
</head>
<body>
<main id="app">
  <section id="intro" class="scene active">
    <div class="envelope-shell">
      <div class="envelope" id="envelope">
        <div class="env-back"></div>
        <div class="invitation-peek"></div>
        <div class="env-flap"></div>
        <div class="env-front"></div>
      </div>
      <button id="openEnvelope" class="btn">Άνοιξε το προσκλητήριο</button>
    </div>
  </section>

  <section id="coverScene" class="scene">
    <div class="book-wrap">
      <div class="lace-card">
        <div class="paper cover-paper">
          <img src="page-1.png" alt="Εξώφυλλο προσκλητηρίου">
        </div>
        <div class="css-bow" id="bow" aria-hidden="true">
          <span class="loop loop-left"></span>
          <span class="loop loop-right"></span>
          <span class="knot"></span>
          <span class="tail tail-left"></span>
          <span class="tail tail-right"></span>
        </div>
      </div>
    </div>
    <button id="untieBow" class="btn">Λύσε τον φιόγκο</button>
  </section>

  <section id="pageScene" class="scene">
    <div class="flipbook">
      <div class="page-stack"></div>
      <div class="page-card" id="pageCard">
        <div class="page-face front">
          <div class="lace-card inner">
            <div class="paper"><img src="page-2.png" alt="Μπροστινή όψη προσκλητηρίου"></div>
          </div>
        </div>
        <div class="page-face back">
          <div class="lace-card inner">
            <div class="paper"><img src="page-3.png" alt="Πίσω όψη προσκλητηρίου"></div>
          </div>
        </div>
        <div class="curl"></div>
      </div>
    </div>
    <div class="actions">
      <button id="turnPage" class="btn">Γύρισε τη σελίδα</button>
      <button id="closeBook" class="btn hidden">Κλείσε το προσκλητήριο</button>
    </div>
  </section>

  <section id="backScene" class="scene">
    <div class="book-wrap">
      <div class="lace-card">
        <div class="paper"><img src="page-4.png" alt="Οπισθόφυλλο προσκλητηρίου"></div>
      </div>
    </div>
    <button id="showMap" class="btn">Δες τον χάρτη</button>
  </section>

  <section id="mapScene" class="scene">
    <div class="map-card">
      <div class="map-glow"></div>
      <h1>Οι τοποθεσίες μας</h1>
      <p>Πατήστε για άμεση πλοήγηση.</p>

      <a class="location" href="https://maps.app.goo.gl/kownvrBH4MBfg8E36" target="_blank" rel="noopener">
        <span class="pin">✦</span>
        <span><strong>Ιερός Ναός Αγίας Θέκλας</strong><small>Αγία Νάπα</small></span>
      </a>

      <div class="route"><span>27.09.2026</span></div>

      <a class="location" href="https://maps.app.goo.gl/R26q9qrDRgKVt6Wx8" target="_blank" rel="noopener">
        <span class="pin">✦</span>
        <span><strong>Ζάππειον Παλάς</strong><small>Δερύνεια</small></span>
      </a>

      <div class="map-buttons">
        <a class="btn link-btn" href="https://maps.app.goo.gl/kownvrBH4MBfg8E36" target="_blank" rel="noopener">Οδηγίες για την εκκλησία</a>
        <a class="btn link-btn" href="https://maps.app.goo.gl/R26q9qrDRgKVt6Wx8" target="_blank" rel="noopener">Οδηγίες για τη δεξίωση</a>
      </div>
      <button id="restart" class="restart">Προβολή από την αρχή</button>
    </div>
  </section>
</main>
<script src="premium.js?v=1"></script>
</body>
</html>
